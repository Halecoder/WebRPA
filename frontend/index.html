<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRPA</title>
    <style>
      /* ============================================================
         WebRPA 首屏加载动画
         - 与编辑器主题（浅色蓝白）和顶栏艺术字 LOGO 风格保持一致
         - 设计参考：Linear / Notion / Vercel / Apple 现代加载体验
         ============================================================ */
      :root {
        /* 与 frontend/src/index.css 主题色保持一致 */
        --splash-brand-400: 213 94% 68%;
        --splash-brand-500: 217 91% 55%;
        --splash-brand-600: 221 83% 48%;
        --splash-brand-700: 224 76% 41%;
        --splash-brand-900: 224 64% 28%;
        --splash-info-500: 199 89% 48%;
        --splash-info-600: 200 91% 42%;
        --splash-bg: 214 32% 95%;
        --splash-bg-soft: 214 100% 97%;
        --splash-card: 0 0% 100%;
        --splash-text: 222 47% 11%;
        --splash-muted: 215 16% 47%;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: hsl(var(--splash-bg));
        color: hsl(var(--splash-text));
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI Variable', 'Segoe UI',
                     'PingFang SC', 'Microsoft YaHei UI', 'Microsoft YaHei',
                     system-ui, sans-serif;
        font-feature-settings: 'cv11', 'ss01', 'ss03';
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #webrpa-splash {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 36px;
        background:
          radial-gradient(ellipse 80% 60% at 50% 28%, hsl(var(--splash-bg-soft)) 0%, transparent 70%),
          radial-gradient(ellipse 60% 50% at 50% 92%, hsl(var(--splash-brand-500) / 0.06) 0%, transparent 70%),
          hsl(var(--splash-bg));
        transition: opacity 360ms cubic-bezier(0.16, 1, 0.3, 1),
                    visibility 360ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      #webrpa-splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      /* 装饰：背景上漂浮的几个柔和光斑 */
      #webrpa-splash::before,
      #webrpa-splash::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        filter: blur(70px);
        opacity: 0.4;
        pointer-events: none;
      }
      #webrpa-splash::before {
        width: 460px;
        height: 460px;
        top: 8%;
        left: 12%;
        background: hsl(var(--splash-brand-500) / 0.2);
        animation: webrpa-float-a 9s ease-in-out infinite;
      }
      #webrpa-splash::after {
        width: 380px;
        height: 380px;
        bottom: 10%;
        right: 10%;
        background: hsl(var(--splash-info-500) / 0.16);
        animation: webrpa-float-b 11s ease-in-out infinite;
      }
    </style>
    <style>
      /* ====== logo 容器与圆角矩形跑道光带 ====== */
      .splash-logo-wrap {
        position: relative;
        width: 132px;
        height: 132px;
        z-index: 1;
        animation: splash-logo-in 700ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .splash-logo-card {
        position: absolute;
        inset: 0;
        background: hsl(var(--splash-card));
        border-radius: 26px;
        box-shadow:
          0 1px 0 0 hsl(var(--splash-brand-500) / 0.08) inset,
          0 1px 2px 0 hsl(var(--splash-text) / 0.05),
          0 12px 28px -8px hsl(var(--splash-brand-500) / 0.22),
          0 32px 60px -16px hsl(var(--splash-brand-500) / 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash-logo-card img {
        width: 78px;
        height: 78px;
        object-fit: contain;
        filter: drop-shadow(0 1px 2px hsl(var(--splash-text) / 0.08));
      }

      /* 静态轨道：让用户能看到环的完整圆角矩形外形 */
      .splash-track-base {
        position: absolute;
        inset: -8px;
        border-radius: 32px;
        border: 1.5px solid hsl(var(--splash-brand-500) / 0.1);
        pointer-events: none;
      }
      /* 沿 logo 圆角矩形外框旋转的"跑道光带"
         实现：在 logo 卡片外侧叠一个稍大的圆角矩形容器，
         conic-gradient 着色 + padding+mask exclude 把内部挖空只留外框，
         整体旋转 → 看起来就是一道光沿圆角矩形边框跑动 */
      .splash-track {
        position: absolute;
        inset: -8px;
        border-radius: 32px;
        padding: 2.5px;
        background:
          conic-gradient(
            from 0deg,
            transparent 0deg,
            transparent 220deg,
            hsl(var(--splash-brand-500) / 0.0) 220deg,
            hsl(var(--splash-brand-500) / 0.5) 280deg,
            hsl(var(--splash-brand-500)) 340deg,
            hsl(var(--splash-info-500)) 358deg,
            transparent 360deg
          );
        -webkit-mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
                mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
                mask-composite: exclude;
        animation: splash-ring-spin 1.6s linear infinite;
        filter: drop-shadow(0 0 10px hsl(var(--splash-brand-500) / 0.5));
        pointer-events: none;
      }
    </style>
    <style>
      /* ====== 标题：完全复刻编辑器顶栏艺术字 LOGO ====== */
      .splash-title {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 0;
        font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 56px;
        line-height: 1;
        letter-spacing: 0.01em;
        margin: 0;
        z-index: 1;
        padding: 6px 8px 6px 4px;
        animation: splash-fade-up 700ms cubic-bezier(0.16, 1, 0.3, 1) 120ms backwards;
      }
      .splash-title-letter {
        display: inline-block;
        position: relative;
      }
      /* 把 Web 三个字母装进一个共同容器，让流光作为整体扫过整个 Web，光带连贯不"在字母间重启"
         注意：skewX 必须放在父容器上，因为子元素 transform 会破坏 background-clip:text 的渲染上下文 */
      .splash-title-web {
        display: inline-block;
        position: relative;
        font-style: italic;
        transform: skewX(-6deg);
        background:
          /* 第一层：流光带（动画移动） */
          linear-gradient(100deg,
            hsl(0 0% 100% / 0) 40%,
            hsl(0 0% 100% / 0.95) 50%,
            hsl(0 0% 100% / 0) 60%
          ),
          /* 第二层：基础蓝渐变 */
          linear-gradient(135deg,
            hsl(var(--splash-brand-700)) 0%,
            hsl(var(--splash-brand-500)) 35%,
            hsl(var(--splash-info-500)) 70%,
            hsl(var(--splash-brand-600)) 100%
          );
        background-size: 320% 100%, 100% 100%;
        background-position: 200% 0, 0 0;
        background-repeat: no-repeat, no-repeat;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        text-shadow: 0 1px 0 hsl(var(--splash-brand-500) / 0.04);
        animation: splash-shine 4.2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }
      /* 子字母只占位，无 padding、无独立 transform，避免破坏 clip-text 渲染 */
      .splash-title-letter-w,
      .splash-title-letter-e,
      .splash-title-letter-b {
        padding: 0;
      }

      /* "RPA" 胶囊 - 流光做在 background 上，与 Web 容器共享 keyframes，用 animation-delay 接力 */
      .splash-title-pill {
        display: inline-flex;
        align-items: center;
        margin-left: 14px;
        padding: 6px 18px 6px 14px;
        border-radius: 14px;
        background:
          /* 第一层：流光带（与 Web 容器一致） */
          linear-gradient(100deg,
            hsl(0 0% 100% / 0) 40%,
            hsl(0 0% 100% / 0.55) 50%,
            hsl(0 0% 100% / 0) 60%
          ),
          /* 第二层：胶囊蓝渐变底色 */
          linear-gradient(135deg,
            hsl(var(--splash-brand-500)) 0%,
            hsl(var(--splash-brand-600)) 50%,
            hsl(var(--splash-info-600)) 100%
          );
        background-size: 320% 100%, 100% 100%;
        background-position: 200% 0, 0 0;
        background-repeat: no-repeat, no-repeat;
        box-shadow:
          0 4px 14px hsl(var(--splash-brand-500) / 0.42),
          0 1px 0 hsl(0 0% 100% / 0.35) inset,
          0 -1px 0 hsl(var(--splash-brand-700) / 0.4) inset;
        position: relative;
        overflow: hidden;
        animation: splash-shine 4.2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        /* 与 Web 容器完全同步：同一个延迟、同一个时长、同一个方向 */
        animation-delay: 0s;
      }
      .splash-title-pill::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 14px;
        background: linear-gradient(180deg, hsl(0 0% 100% / 0.2), transparent 60%);
        pointer-events: none;
      }
      .splash-title-letter-r,
      .splash-title-letter-p,
      .splash-title-letter-a {
        color: #fff;
        text-shadow: 0 1px 1.5px hsl(var(--splash-brand-900) / 0.35);
        padding: 0;
        position: relative;
        z-index: 1;
        font-style: italic;
        display: inline-block;
        transform: skewX(-6deg);
      }
      .splash-title-letter-a {
        padding-right: 0;
      }
    </style>
    <style>
      /* ====== 副标题、进度条、底部 tip ====== */
      .splash-subtitle {
        font-size: 17px;
        color: hsl(var(--splash-muted));
        margin: 0;
        line-height: 1;
        z-index: 1;
        animation: splash-fade-up 700ms cubic-bezier(0.16, 1, 0.3, 1) 240ms backwards;
        letter-spacing: 0.02em;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .splash-dots {
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }
      .splash-dots span {
        width: 6px;
        height: 6px;
        border-radius: 99px;
        background: hsl(var(--splash-brand-500));
        animation: splash-dot 1.4s cubic-bezier(0.16, 1, 0.3, 1) infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.18s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.36s; }

      .splash-progress {
        position: relative;
        width: 280px;
        height: 4px;
        border-radius: 99px;
        background: hsl(var(--splash-brand-500) / 0.12);
        overflow: hidden;
        z-index: 1;
        animation: splash-fade-up 700ms cubic-bezier(0.16, 1, 0.3, 1) 360ms backwards;
        box-shadow: 0 1px 2px hsl(var(--splash-text) / 0.04) inset;
      }
      .splash-progress-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        border-radius: 99px;
        background: linear-gradient(90deg,
          hsl(var(--splash-brand-500) / 0.15) 0%,
          hsl(var(--splash-brand-500)) 30%,
          hsl(var(--splash-info-500)) 70%,
          hsl(var(--splash-brand-500) / 0.15) 100%);
        animation: splash-progress 1.6s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        box-shadow: 0 0 8px hsl(var(--splash-brand-500) / 0.4);
      }

      .splash-tip {
        position: absolute;
        bottom: 40px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 14px;
        color: hsl(var(--splash-muted));
        letter-spacing: 0.02em;
        z-index: 1;
        opacity: 0.75;
        font-weight: 500;
        animation: splash-fade-up 800ms cubic-bezier(0.16, 1, 0.3, 1) 560ms backwards;
      }
      .splash-tip strong {
        color: hsl(var(--splash-brand-700));
        font-weight: 600;
      }
      .splash-dots-inline {
        display: inline-flex;
        gap: 3px;
        align-items: center;
        margin-left: 4px;
        vertical-align: middle;
      }
      .splash-dots-inline span {
        width: 3px;
        height: 3px;
        border-radius: 99px;
        background: hsl(var(--splash-muted));
        animation: splash-dot 1.4s cubic-bezier(0.16, 1, 0.3, 1) infinite;
      }
      .splash-dots-inline span:nth-child(2) { animation-delay: 0.18s; }
      .splash-dots-inline span:nth-child(3) { animation-delay: 0.36s; }
    </style>
    <style>
      /* ====== 动画 keyframes ====== */
      @keyframes splash-logo-in {
        from { opacity: 0; transform: scale(0.82) translateY(10px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes splash-fade-up {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-ring-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-dot {
        0%, 60%, 100% { opacity: 0.25; transform: scale(0.75); }
        30%           { opacity: 1;    transform: scale(1.15); }
      }
      @keyframes splash-progress {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
      /* 流光关键帧：背景从右侧外（200%）移动到左侧外（-200%），即"光带从字形左边进、右边出"
         配合 background-position 写法："xxx% 0" 表示背景图相对容器左边的偏移
         200%  → 光带在容器右外，字形里看不到光
         0     → 光带在字形中央（最亮的瞬间）
         -200% → 光带在容器左外，字形里又看不到光了
         为什么是从 200%→-200% 而不是反过来？因为 100deg 的渐变本身是右上→左下方向，
         所以背景从右往左移看起来才是"从左→右扫过字形"（视觉方向） */
      @keyframes splash-shine {
        0%        { background-position: 200% 0, 0 0; }
        50%, 100% { background-position: -200% 0, 0 0; }
      }
      @keyframes webrpa-float-a {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50%      { transform: translate(24px, -18px) scale(1.05); }
      }
      @keyframes webrpa-float-b {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50%      { transform: translate(-26px, 16px) scale(0.95); }
      }
    </style>
  </head>
  <body>
    <!-- 首屏加载动画：与 WebRPA 编辑器主题与艺术字 LOGO 完全一致 -->
    <div id="webrpa-splash" role="status" aria-label="WebRPA 加载中">
      <!-- logo 卡片 + 圆角矩形跑道光带 -->
      <div class="splash-logo-wrap">
        <div class="splash-track-base"></div>
        <div class="splash-track"></div>
        <div class="splash-logo-card">
          <img src="/logo.png" alt="" />
        </div>
      </div>

      <!-- 标题：编辑器同款艺术字 -->
      <div class="splash-title" aria-label="WebRPA">
        <span class="splash-title-web">
          <span class="splash-title-letter splash-title-letter-w">W</span>
          <span class="splash-title-letter splash-title-letter-e">e</span>
          <span class="splash-title-letter splash-title-letter-b">b</span>
        </span>
        <span class="splash-title-pill">
          <span class="splash-title-letter splash-title-letter-r">R</span>
          <span class="splash-title-letter splash-title-letter-p">P</span>
          <span class="splash-title-letter splash-title-letter-a">A</span>
        </span>
      </div>

      <!-- 副标题 + 三点跳动 -->
      <p class="splash-subtitle">
        正在启动编辑器
        <span class="splash-dots"><span></span><span></span><span></span></span>
      </p>

      <!-- 进度条 -->
      <div class="splash-progress" aria-hidden="true">
        <div class="splash-progress-bar"></div>
      </div>

      <!-- 底部小字 -->
      <p class="splash-tip">
        青云制作_彭明航 &nbsp;·&nbsp; 执行器加载中<span class="splash-dots-inline"><span></span><span></span><span></span></span>
      </p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // ============================================================
      // 智能移除首屏加载动画
      //   优先：React 渲染完 #root 后立即移除（用 MutationObserver 监听）
      //   兜底：8 秒强制移除，避免某些异常情况下永远卡 splash
      // ============================================================
      (function () {
        var splash = document.getElementById('webrpa-splash');
        if (!splash) return;
        var root = document.getElementById('root');
        var removed = false;

        function hideSplash() {
          if (removed) return;
          removed = true;
          splash.classList.add('hidden');
          setTimeout(function () {
            if (splash && splash.parentNode) {
              splash.parentNode.removeChild(splash);
            }
          }, 380);
        }

        // 监听 React 是否已渲染（#root 有子节点 = 已挂载）
        if (root && typeof MutationObserver !== 'undefined') {
          var observer = new MutationObserver(function () {
            if (root.children.length > 0) {
              observer.disconnect();
              // 让首帧渲染稳定一下再淡出，避免闪烁
              requestAnimationFrame(function () {
                requestAnimationFrame(hideSplash);
              });
            }
          });
          observer.observe(root, { childList: true });
        }

        // 兜底：8 秒后强制移除
        setTimeout(function () {
          if (!removed) hideSplash();
        }, 8000);
      })();
    </script>
  </body>
</html>
