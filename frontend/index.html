<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRPA</title>
    <style>
      /* ============================================================
         首屏加载动画（不依赖任何 JS / 字体 / 网络资源，立即显示）
         React 接管 #root 后会自动覆盖整个 body，#webrpa-splash 自然被遮住；
         我们用 MutationObserver + 超时双兜底确保首帧渲染后立即移除。
         ============================================================ */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        color: #f1f5f9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      #webrpa-splash {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        transition: opacity 280ms ease, visibility 280ms ease;
      }
      #webrpa-splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .webrpa-splash-logo-wrap {
        position: relative;
        width: 96px;
        height: 96px;
      }
      .webrpa-splash-logo {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        animation: webrpa-splash-logo-pulse 1.6s ease-in-out infinite;
        box-shadow: 0 8px 32px rgba(59, 130, 246, 0.35);
      }
      .webrpa-splash-ring {
        position: absolute;
        inset: -10px;
        border-radius: 28px;
        border: 2px solid transparent;
        border-top-color: #60a5fa;
        border-right-color: #60a5fa;
        animation: webrpa-splash-spin 1.2s linear infinite;
      }
      .webrpa-splash-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 2px;
        background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
      }
      .webrpa-splash-subtitle {
        font-size: 13px;
        color: #94a3b8;
        letter-spacing: 1px;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .webrpa-splash-dots {
        display: inline-flex;
        gap: 4px;
      }
      .webrpa-splash-dots span {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #60a5fa;
        animation: webrpa-splash-dot 1.2s ease-in-out infinite;
      }
      .webrpa-splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      .webrpa-splash-dots span:nth-child(3) { animation-delay: 0.3s; }
      .webrpa-splash-progress {
        width: 220px;
        height: 3px;
        border-radius: 99px;
        background: rgba(148, 163, 184, 0.18);
        overflow: hidden;
        margin-top: 4px;
      }
      .webrpa-splash-progress-bar {
        height: 100%;
        width: 30%;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        border-radius: 99px;
        animation: webrpa-splash-progress 1.6s ease-in-out infinite;
      }
      .webrpa-splash-tip {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11.5px;
        color: #64748b;
        letter-spacing: 0.5px;
      }
      @keyframes webrpa-splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes webrpa-splash-logo-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }
      @keyframes webrpa-splash-dot {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.7); }
        40% { opacity: 1; transform: scale(1.2); }
      }
      @keyframes webrpa-splash-progress {
        0% { width: 0; margin-left: 0; }
        50% { width: 70%; margin-left: 15%; }
        100% { width: 0; margin-left: 100%; }
      }
    </style>
  </head>
  <body>
    <!-- 首屏加载动画：在 React 接管前就能看到 -->
    <div id="webrpa-splash" role="status" aria-label="WebRPA 加载中">
      <div class="webrpa-splash-logo-wrap">
        <img src="/logo.png" alt="" class="webrpa-splash-logo" />
        <div class="webrpa-splash-ring"></div>
      </div>
      <h1 class="webrpa-splash-title">WebRPA</h1>
      <p class="webrpa-splash-subtitle">
        <span>正在启动编辑器</span>
        <span class="webrpa-splash-dots"><span></span><span></span><span></span></span>
      </p>
      <div class="webrpa-splash-progress" aria-hidden="true">
        <div class="webrpa-splash-progress-bar"></div>
      </div>
      <p class="webrpa-splash-tip">首次启动加载稍慢，正在准备 460+ 个执行器和资源</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // ============================================================
      // 智能移除首屏加载动画
      //   优先：React 渲染完 #root 后立即移除（用 MutationObserver 监听）
      //   兜底：5 秒强制移除，避免某些异常情况下永远卡 splash
      // ============================================================
      (function () {
        var splash = document.getElementById('webrpa-splash');
        if (!splash) return;
        var root = document.getElementById('root');
        var removed = false;

        function hideSplash() {
          if (removed) return;
          removed = true;
          splash.classList.add('hidden');
          // 完整动画结束后移除节点
          setTimeout(function () {
            if (splash && splash.parentNode) {
              splash.parentNode.removeChild(splash);
            }
          }, 350);
        }

        // 监听 React 是否已渲染（#root 有子节点 = 已挂载）
        if (root && typeof MutationObserver !== 'undefined') {
          var observer = new MutationObserver(function () {
            if (root.children.length > 0) {
              observer.disconnect();
              // 让首帧渲染稳定一下再淡出，避免闪烁
              requestAnimationFrame(function () {
                requestAnimationFrame(hideSplash);
              });
            }
          });
          observer.observe(root, { childList: true });
        }

        // 兜底：8 秒后强制移除
        setTimeout(function () {
          if (!removed) hideSplash();
        }, 8000);
      })();
    </script>
  </body>
</html>
