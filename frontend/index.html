<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRPA</title>
    <style>
      /* ============================================================
         WebRPA 首屏加载动画 — 与编辑器主题（浅色蓝白）保持一致
         设计参考：Linear / Notion / Vercel 现代加载体验
         ============================================================ */
      :root {
        --splash-brand: 217 91% 55%;
        --splash-brand-light: 214 100% 97%;
        --splash-bg: 214 32% 95%;
        --splash-card: 0 0% 100%;
        --splash-text: 222 47% 11%;
        --splash-muted: 215 16% 47%;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: hsl(var(--splash-bg));
        color: hsl(var(--splash-text));
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI Variable', 'Segoe UI',
                     'PingFang SC', 'Microsoft YaHei UI', 'Microsoft YaHei',
                     system-ui, sans-serif;
        font-feature-settings: 'cv11', 'ss01', 'ss03';
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #webrpa-splash {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background:
          radial-gradient(ellipse 80% 60% at 50% 30%, hsl(var(--splash-brand-light)) 0%, transparent 70%),
          radial-gradient(ellipse 60% 50% at 50% 90%, hsl(var(--splash-brand) / 0.06) 0%, transparent 70%),
          hsl(var(--splash-bg));
        transition: opacity 320ms cubic-bezier(0.16, 1, 0.3, 1),
                    visibility 320ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      #webrpa-splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      /* 装饰：背景上漂浮的几个柔和光斑 */
      #webrpa-splash::before,
      #webrpa-splash::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.35;
        pointer-events: none;
      }
      #webrpa-splash::before {
        width: 380px;
        height: 380px;
        top: 12%;
        left: 14%;
        background: hsl(var(--splash-brand) / 0.18);
        animation: webrpa-float-a 8s ease-in-out infinite;
      }
      #webrpa-splash::after {
        width: 320px;
        height: 320px;
        bottom: 14%;
        right: 12%;
        background: hsl(217 100% 70% / 0.12);
        animation: webrpa-float-b 10s ease-in-out infinite;
      }

      /* logo 容器 */
      .splash-logo-wrap {
        position: relative;
        width: 88px;
        height: 88px;
        z-index: 1;
        animation: splash-logo-in 600ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .splash-logo-wrap .splash-logo-card {
        position: absolute;
        inset: 0;
        background: hsl(var(--splash-card));
        border-radius: 22px;
        box-shadow:
          0 1px 0 0 hsl(var(--splash-brand) / 0.08) inset,
          0 1px 2px 0 hsl(var(--splash-text) / 0.05),
          0 8px 24px -6px hsl(var(--splash-brand) / 0.18),
          0 24px 48px -12px hsl(var(--splash-brand) / 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash-logo-wrap img {
        width: 56px;
        height: 56px;
        object-fit: contain;
        filter: drop-shadow(0 1px 2px hsl(var(--splash-text) / 0.08));
      }
      /* 围绕 logo 旋转的细圆环 */
      .splash-logo-ring {
        position: absolute;
        inset: -8px;
        border-radius: 28px;
        background: conic-gradient(
          from 0deg,
          transparent 0deg,
          transparent 240deg,
          hsl(var(--splash-brand)) 320deg,
          transparent 360deg
        );
        -webkit-mask: radial-gradient(circle, transparent 56%, #000 58%);
                mask: radial-gradient(circle, transparent 56%, #000 58%);
        animation: splash-ring-spin 1.6s linear infinite;
        opacity: 0.7;
      }

      /* 标题 */
      .splash-title {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: hsl(var(--splash-text));
        margin: 0;
        line-height: 1;
        z-index: 1;
        animation: splash-fade-up 600ms cubic-bezier(0.16, 1, 0.3, 1) 100ms backwards;
        display: flex;
        align-items: baseline;
        gap: 6px;
      }
      .splash-title .splash-title-accent {
        background: linear-gradient(135deg,
          hsl(var(--splash-brand)) 0%,
          hsl(217 100% 65%) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .splash-subtitle {
        font-size: 13px;
        color: hsl(var(--splash-muted));
        margin: 0;
        line-height: 1;
        z-index: 1;
        animation: splash-fade-up 600ms cubic-bezier(0.16, 1, 0.3, 1) 200ms backwards;
        letter-spacing: 0.02em;
      }

      /* 三点跳动 */
      .splash-dots {
        display: inline-flex;
        gap: 5px;
        align-items: center;
        margin-left: 6px;
        vertical-align: middle;
      }
      .splash-dots span {
        width: 4px;
        height: 4px;
        border-radius: 99px;
        background: hsl(var(--splash-brand));
        animation: splash-dot 1.4s cubic-bezier(0.16, 1, 0.3, 1) infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.18s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.36s; }

      /* 进度条 */
      .splash-progress {
        position: relative;
        width: 200px;
        height: 3px;
        border-radius: 99px;
        background: hsl(var(--splash-brand) / 0.12);
        overflow: hidden;
        z-index: 1;
        animation: splash-fade-up 600ms cubic-bezier(0.16, 1, 0.3, 1) 300ms backwards;
      }
      .splash-progress-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        border-radius: 99px;
        background: linear-gradient(90deg,
          hsl(var(--splash-brand) / 0.2) 0%,
          hsl(var(--splash-brand)) 50%,
          hsl(var(--splash-brand) / 0.2) 100%);
        animation: splash-progress 1.6s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }

      /* 底部文字 */
      .splash-tip {
        position: absolute;
        bottom: 36px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        color: hsl(var(--splash-muted));
        letter-spacing: 0.02em;
        z-index: 1;
        opacity: 0.7;
        animation: splash-fade-up 700ms cubic-bezier(0.16, 1, 0.3, 1) 500ms backwards;
      }

      /* 动画 */
      @keyframes splash-logo-in {
        from { opacity: 0; transform: scale(0.85) translateY(8px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes splash-fade-up {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-ring-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-dot {
        0%, 60%, 100% { opacity: 0.25; transform: scale(0.8); }
        30%           { opacity: 1;    transform: scale(1.15); }
      }
      @keyframes splash-progress {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
      @keyframes webrpa-float-a {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50%      { transform: translate(20px, -16px) scale(1.04); }
      }
      @keyframes webrpa-float-b {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50%      { transform: translate(-24px, 14px) scale(0.96); }
      }
    </style>
  </head>
  <body>
    <!-- 首屏加载动画：与 WebRPA 编辑器浅色蓝白主题保持一致 -->
    <div id="webrpa-splash" role="status" aria-label="WebRPA 加载中">
      <div class="splash-logo-wrap">
        <div class="splash-logo-card">
          <img src="/logo.png" alt="" />
        </div>
        <div class="splash-logo-ring"></div>
      </div>
      <h1 class="splash-title">
        Web<span class="splash-title-accent">RPA</span>
      </h1>
      <p class="splash-subtitle">
        正在启动编辑器
        <span class="splash-dots"><span></span><span></span><span></span></span>
      </p>
      <div class="splash-progress" aria-hidden="true">
        <div class="splash-progress-bar"></div>
      </div>
      <p class="splash-tip">青云制作 · 469 个执行器加载中</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // ============================================================
      // 智能移除首屏加载动画
      //   优先：React 渲染完 #root 后立即移除（用 MutationObserver 监听）
      //   兜底：8 秒强制移除，避免某些异常情况下永远卡 splash
      // ============================================================
      (function () {
        var splash = document.getElementById('webrpa-splash');
        if (!splash) return;
        var root = document.getElementById('root');
        var removed = false;

        function hideSplash() {
          if (removed) return;
          removed = true;
          splash.classList.add('hidden');
          setTimeout(function () {
            if (splash && splash.parentNode) {
              splash.parentNode.removeChild(splash);
            }
          }, 350);
        }

        // 监听 React 是否已渲染（#root 有子节点 = 已挂载）
        if (root && typeof MutationObserver !== 'undefined') {
          var observer = new MutationObserver(function () {
            if (root.children.length > 0) {
              observer.disconnect();
              // 让首帧渲染稳定一下再淡出，避免闪烁
              requestAnimationFrame(function () {
                requestAnimationFrame(hideSplash);
              });
            }
          });
          observer.observe(root, { childList: true });
        }

        // 兜底：8 秒后强制移除
        setTimeout(function () {
          if (!removed) hideSplash();
        }, 8000);
      })();
    </script>
  </body>
</html>
