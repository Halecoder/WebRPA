<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRPA 加载页面预览</title>
    <style>
      :root {
        --splash-brand-400: 213 94% 68%;
        --splash-brand-500: 217 91% 55%;
        --splash-brand-600: 221 83% 48%;
        --splash-brand-700: 224 76% 41%;
        --splash-brand-900: 224 64% 28%;
        --splash-info-500: 199 89% 48%;
        --splash-info-600: 200 91% 42%;
        --splash-bg: 214 32% 95%;
        --splash-bg-soft: 214 100% 97%;
        --splash-card: 0 0% 100%;
        --splash-text: 222 47% 11%;
        --splash-muted: 215 16% 47%;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: hsl(var(--splash-bg));
        color: hsl(var(--splash-text));
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI Variable', 'Segoe UI',
                     'PingFang SC', 'Microsoft YaHei UI', 'Microsoft YaHei',
                     system-ui, sans-serif;
        font-feature-settings: 'cv11', 'ss01', 'ss03';
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #webrpa-splash {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 36px;
        background:
          radial-gradient(ellipse 80% 60% at 50% 28%, hsl(var(--splash-bg-soft)) 0%, transparent 70%),
          radial-gradient(ellipse 60% 50% at 50% 92%, hsl(var(--splash-brand-500) / 0.06) 0%, transparent 70%),
          hsl(var(--splash-bg));
      }
      #webrpa-splash::before,
      #webrpa-splash::after {
        display: none;
      }
    </style>
    <style>
      /* ====== 背景流动圆斑（淡蓝唯美氛围层） ====== */
      .splash-bubbles {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
      }
      .splash-bubble {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0;
        will-change: transform, opacity;
      }
      .splash-bubble-1 {
        width: 320px; height: 320px;
        top: 6%; left: 8%;
        background: hsl(var(--splash-brand-500) / 0.28);
        animation: bubble-drift-1 14s ease-in-out infinite;
      }
      .splash-bubble-2 {
        width: 240px; height: 240px;
        top: 18%; right: 12%;
        background: hsl(var(--splash-info-500) / 0.22);
        animation: bubble-drift-2 17s ease-in-out infinite;
        animation-delay: -3s;
      }
      .splash-bubble-3 {
        width: 380px; height: 380px;
        bottom: 8%; left: 18%;
        background: hsl(var(--splash-brand-400) / 0.2);
        animation: bubble-drift-3 19s ease-in-out infinite;
        animation-delay: -6s;
      }
      .splash-bubble-4 {
        width: 200px; height: 200px;
        bottom: 22%; right: 8%;
        background: hsl(var(--splash-info-600) / 0.24);
        animation: bubble-drift-4 13s ease-in-out infinite;
        animation-delay: -1.5s;
      }
      .splash-bubble-5 {
        width: 160px; height: 160px;
        top: 50%; left: 50%;
        margin-top: -80px; margin-left: -80px;
        background: hsl(var(--splash-brand-500) / 0.16);
        animation: bubble-drift-5 21s ease-in-out infinite;
        animation-delay: -8s;
      }
      .splash-bubble-6 {
        width: 280px; height: 280px;
        top: 62%; right: 28%;
        background: hsl(var(--splash-brand-400) / 0.18);
        animation: bubble-drift-6 16s ease-in-out infinite;
        animation-delay: -4.5s;
      }
      @keyframes bubble-drift-1 {
        0%   { transform: translate(0, 0) scale(1);     opacity: 0.45; }
        25%  { transform: translate(40px, 30px) scale(1.08); opacity: 0.6; }
        50%  { transform: translate(80px, -20px) scale(0.95); opacity: 0.4; }
        75%  { transform: translate(20px, -50px) scale(1.05); opacity: 0.55; }
        100% { transform: translate(0, 0) scale(1);     opacity: 0.45; }
      }
      @keyframes bubble-drift-2 {
        0%   { transform: translate(0, 0) scale(1);       opacity: 0.5; }
        33%  { transform: translate(-50px, 40px) scale(1.1); opacity: 0.7; }
        66%  { transform: translate(-30px, 80px) scale(0.92); opacity: 0.45; }
        100% { transform: translate(0, 0) scale(1);       opacity: 0.5; }
      }
      @keyframes bubble-drift-3 {
        0%   { transform: translate(0, 0) scale(1);     opacity: 0.4; }
        20%  { transform: translate(60px, -30px) scale(1.06); opacity: 0.55; }
        50%  { transform: translate(100px, -60px) scale(1.12); opacity: 0.65; }
        80%  { transform: translate(40px, -20px) scale(0.96); opacity: 0.42; }
        100% { transform: translate(0, 0) scale(1);     opacity: 0.4; }
      }
      @keyframes bubble-drift-4 {
        0%   { transform: translate(0, 0) scale(1);       opacity: 0.5; }
        50%  { transform: translate(-70px, -50px) scale(1.15); opacity: 0.7; }
        100% { transform: translate(0, 0) scale(1);       opacity: 0.5; }
      }
      @keyframes bubble-drift-5 {
        0%   { transform: translate(0, 0) scale(1);       opacity: 0.35; }
        25%  { transform: translate(40px, -40px) scale(1.2); opacity: 0.55; }
        50%  { transform: translate(-40px, 40px) scale(0.9); opacity: 0.3; }
        75%  { transform: translate(20px, -30px) scale(1.1); opacity: 0.5; }
        100% { transform: translate(0, 0) scale(1);       opacity: 0.35; }
      }
      @keyframes bubble-drift-6 {
        0%   { transform: translate(0, 0) scale(1);     opacity: 0.42; }
        33%  { transform: translate(50px, 30px) scale(1.08); opacity: 0.58; }
        66%  { transform: translate(-30px, 60px) scale(0.94); opacity: 0.4; }
        100% { transform: translate(0, 0) scale(1);     opacity: 0.42; }
      }
    </style>
    <style>
      .splash-logo-wrap {
        position: relative;
        width: 132px;
        height: 132px;
        z-index: 1;
        animation: splash-logo-in 700ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .splash-logo-card {
        position: absolute;
        inset: 0;
        background: hsl(var(--splash-card));
        border-radius: 26px;
        box-shadow:
          0 1px 0 0 hsl(var(--splash-brand-500) / 0.08) inset,
          0 1px 2px 0 hsl(var(--splash-text) / 0.05),
          0 12px 28px -8px hsl(var(--splash-brand-500) / 0.22),
          0 32px 60px -16px hsl(var(--splash-brand-500) / 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash-logo-card img {
        width: 100px;
        height: 100px;
        object-fit: contain;
        filter: drop-shadow(0 1px 2px hsl(var(--splash-text) / 0.08));
      }
      .splash-track-svg {
        position: absolute;
        inset: -10px;
        width: calc(100% + 20px);
        height: calc(100% + 20px);
        overflow: visible;
        pointer-events: none;
        filter: drop-shadow(0 0 6px hsl(var(--splash-brand-500) / 0.55));
      }
      .splash-track-svg .splash-track-base-rect {
        fill: none;
        stroke: hsl(var(--splash-brand-500) / 0.12);
        stroke-width: 1.5;
      }
      .splash-track-svg .splash-track-glow {
        fill: none;
        stroke: url(#splashTrackGradient);
        stroke-width: 2.5;
        stroke-linecap: round;
        animation: splash-track-flow 1.8s linear infinite;
      }
    </style>
    <style>
      .splash-title {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 0;
        font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 56px;
        line-height: 1;
        letter-spacing: 0.01em;
        margin: 0;
        z-index: 1;
        padding: 6px 22px 6px 4px;
        animation: splash-fade-up 700ms cubic-bezier(0.16, 1, 0.3, 1) 120ms backwards;
      }
      .splash-title-letter {
        display: inline-block;
        position: relative;
        font-style: italic;
        transform: skewX(-6deg);
        padding-right: 2px;
      }
      .splash-title-letter-w,
      .splash-title-letter-e,
      .splash-title-letter-b {
        background:
          linear-gradient(100deg,
            hsl(0 0% 100% / 0) 40%,
            hsl(0 0% 100% / 0.95) 50%,
            hsl(0 0% 100% / 0) 60%
          ),
          linear-gradient(135deg,
            hsl(var(--splash-brand-700)) 0%,
            hsl(var(--splash-brand-500)) 35%,
            hsl(var(--splash-info-500)) 70%,
            hsl(var(--splash-brand-600)) 100%
          );
        background-size: 320% 100%, 100% 100%;
        background-position: 200% 0, 0 0;
        background-repeat: no-repeat, no-repeat;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        text-shadow: 0 1px 0 hsl(var(--splash-brand-500) / 0.04);
        padding: 0 2px;
        animation: splash-letter-shine 4.2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }
      .splash-title-letter-e { animation-delay: 0.06s; }
      .splash-title-letter-b { animation-delay: 0.12s; }

      .splash-title-pill {
        display: inline-flex;
        align-items: center;
        margin-left: 14px;
        padding: 6px 18px 6px 14px;
        border-radius: 14px;
        background:
          linear-gradient(100deg,
            hsl(0 0% 100% / 0) 40%,
            hsl(0 0% 100% / 0.55) 50%,
            hsl(0 0% 100% / 0) 60%
          ),
          linear-gradient(135deg,
            hsl(var(--splash-brand-500)) 0%,
            hsl(var(--splash-brand-600)) 50%,
            hsl(var(--splash-info-600)) 100%
          );
        background-size: 320% 100%, 100% 100%;
        background-position: 200% 0, 0 0;
        background-repeat: no-repeat, no-repeat;
        box-shadow:
          0 4px 14px hsl(var(--splash-brand-500) / 0.42),
          0 1px 0 hsl(0 0% 100% / 0.35) inset,
          0 -1px 0 hsl(var(--splash-brand-700) / 0.4) inset;
        position: relative;
        overflow: hidden;
        animation: splash-letter-shine 4.2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        animation-delay: 0.18s;
      }
      .splash-title-pill::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 14px;
        background: linear-gradient(180deg, hsl(0 0% 100% / 0.2), transparent 60%);
        pointer-events: none;
      }
      .splash-title-letter-r,
      .splash-title-letter-p,
      .splash-title-letter-a {
        color: #fff;
        text-shadow: 0 1px 1.5px hsl(var(--splash-brand-900) / 0.35);
        padding: 0 2px;
        position: relative;
        z-index: 1;
      }
      .splash-title-letter-a {
        padding-right: 0;
      }
    </style>
    <style>
      .splash-subtitle {
        font-size: 17px;
        color: hsl(var(--splash-muted));
        margin: 0;
        line-height: 1;
        z-index: 1;
        animation: splash-fade-up 700ms cubic-bezier(0.16, 1, 0.3, 1) 240ms backwards;
        letter-spacing: 0.02em;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .splash-dots {
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }
      .splash-dots span {
        width: 6px;
        height: 6px;
        border-radius: 99px;
        background: hsl(var(--splash-brand-500));
        animation: splash-dot 1.4s cubic-bezier(0.16, 1, 0.3, 1) infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.18s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.36s; }
      .splash-progress {
        position: relative;
        width: 280px;
        height: 4px;
        border-radius: 99px;
        background: hsl(var(--splash-brand-500) / 0.12);
        overflow: hidden;
        z-index: 1;
        animation: splash-fade-up 700ms cubic-bezier(0.16, 1, 0.3, 1) 360ms backwards;
        box-shadow: 0 1px 2px hsl(var(--splash-text) / 0.04) inset;
      }
      .splash-progress-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        border-radius: 99px;
        background: linear-gradient(90deg,
          hsl(var(--splash-brand-500) / 0.15) 0%,
          hsl(var(--splash-brand-500)) 30%,
          hsl(var(--splash-info-500)) 70%,
          hsl(var(--splash-brand-500) / 0.15) 100%);
        animation: splash-progress 1.6s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        box-shadow: 0 0 8px hsl(var(--splash-brand-500) / 0.4);
      }
      .splash-tip {
        position: absolute;
        bottom: 40px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 14px;
        color: hsl(var(--splash-muted));
        letter-spacing: 0.02em;
        z-index: 1;
        opacity: 0.75;
        font-weight: 500;
        animation: splash-fade-up 800ms cubic-bezier(0.16, 1, 0.3, 1) 560ms backwards;
      }
      .splash-tip strong {
        color: hsl(var(--splash-brand-700));
        font-weight: 600;
      }
      .splash-dots-inline {
        display: inline-flex;
        gap: 3px;
        align-items: center;
        margin-left: 4px;
        vertical-align: middle;
      }
      .splash-dots-inline span {
        width: 3px;
        height: 3px;
        border-radius: 99px;
        background: hsl(var(--splash-muted));
        animation: splash-dot 1.4s cubic-bezier(0.16, 1, 0.3, 1) infinite;
      }
      .splash-dots-inline span:nth-child(2) { animation-delay: 0.18s; }
      .splash-dots-inline span:nth-child(3) { animation-delay: 0.36s; }
      /* 预览页右上角说明 */
      .preview-badge {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 9999999;
        padding: 8px 14px;
        font-size: 12px;
        color: hsl(var(--splash-muted));
        background: hsl(var(--splash-card) / 0.7);
        backdrop-filter: blur(8px);
        border: 1px solid hsl(var(--splash-brand-500) / 0.15);
        border-radius: 99px;
        box-shadow: 0 2px 8px hsl(var(--splash-text) / 0.06);
        font-weight: 500;
        letter-spacing: 0.02em;
        user-select: none;
      }
    </style>
    <style>
      @keyframes splash-logo-in {
        from { opacity: 0; transform: scale(0.82) translateY(10px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes splash-fade-up {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-ring-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-track-flow {
        from { stroke-dashoffset: 0; }
        to   { stroke-dashoffset: -480; }
      }
      @keyframes splash-dot {
        0%, 60%, 100% { opacity: 0.25; transform: scale(0.75); }
        30%           { opacity: 1;    transform: scale(1.15); }
      }
      @keyframes splash-progress {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
      @keyframes splash-letter-shine {
        0%        { background-position: 200% 0, 0 0; }
        50%, 100% { background-position: -200% 0, 0 0; }
      }
    </style>
  </head>
  <body>
    <div class="preview-badge">SPLASH 预览模式 · 永久显示</div>

    <div id="webrpa-splash" role="status" aria-label="WebRPA 加载中">
      <!-- 背景流动圆斑 -->
      <div class="splash-bubbles" aria-hidden="true">
        <div class="splash-bubble splash-bubble-1"></div>
        <div class="splash-bubble splash-bubble-2"></div>
        <div class="splash-bubble splash-bubble-3"></div>
        <div class="splash-bubble splash-bubble-4"></div>
        <div class="splash-bubble splash-bubble-5"></div>
        <div class="splash-bubble splash-bubble-6"></div>
      </div>
      <div class="splash-logo-wrap">
        <svg class="splash-track-svg" viewBox="0 0 152 152" aria-hidden="true">
          <defs>
            <linearGradient id="splashTrackGradient" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="hsl(217, 91%, 55%)" stop-opacity="0" />
              <stop offset="50%" stop-color="hsl(217, 91%, 55%)" stop-opacity="1" />
              <stop offset="100%" stop-color="hsl(199, 89%, 48%)" stop-opacity="1" />
            </linearGradient>
          </defs>
          <rect class="splash-track-base-rect"
                x="6" y="6" width="140" height="140"
                rx="28" ry="28" />
          <rect class="splash-track-glow"
                x="6" y="6" width="140" height="140"
                rx="28" ry="28"
                stroke-dasharray="130 350" />
        </svg>
        <div class="splash-logo-card">
          <img src="logo.png" alt="" />
        </div>
      </div>

      <div class="splash-title" aria-label="WebRPA">
        <span class="splash-title-letter splash-title-letter-w">W</span>
        <span class="splash-title-letter splash-title-letter-e">e</span>
        <span class="splash-title-letter splash-title-letter-b">b</span>
        <span class="splash-title-pill">
          <span class="splash-title-letter splash-title-letter-r">R</span>
          <span class="splash-title-letter splash-title-letter-p">P</span>
          <span class="splash-title-letter splash-title-letter-a">A</span>
        </span>
      </div>

      <p class="splash-subtitle">
        正在启动编辑器
        <span class="splash-dots"><span></span><span></span><span></span></span>
      </p>

      <div class="splash-progress" aria-hidden="true">
        <div class="splash-progress-bar"></div>
      </div>

      <p class="splash-tip">
        开发者：青云制作_彭明航
      </p>
    </div>
  </body>
</html>
